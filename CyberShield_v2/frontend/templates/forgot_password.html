<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сброс пароля - CyberShield</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🛡️ CyberShield для ИП</h1>
            <h2>Восстановление пароля</h2>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            {% if success %}
            <div class="alert alert-success">{{ success }}</div>

            {% if demo_token %}
            <div class="alert alert-info" style="margin-top: 20px;">
                <strong> Демо-режим:</strong><br>
                Ссылка для сброса:<br>
                <a href="{{ demo_link }}">{{ demo_link }}</a>
            </div>
            {% endif %}
            {% endif %}

            <form method="POST" action="/forgot-password">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required class="form-input">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Отправить</button>
            </form>

            <div class="auth-links">
                <p><a href="/login">Вернуться ко входу</a></p>
            </div>
        </div>
    </div>
</body>
</html>
