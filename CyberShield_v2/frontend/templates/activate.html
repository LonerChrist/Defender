<section class="card">
    <h2>Активация лицензии</h2>
    <p>Введите лицензионный ключ, полученный после покупки:</p>
    <input type="text" id="licenseKey" placeholder="XXXX-XXXX-XXXX-XXXX">
    <button onclick="activateLicense()">Активировать</button>
    <div id="activationResult"></div>
</section>

<script>
async function activateLicense() {
    const key = document.getElementById('licenseKey').value;
    const response = await fetch('/api/license/activate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({key: key})
    });
    const result = await response.json();
    document.getElementById('activationResult').innerHTML =
        result.success ? 'Лицензия активирована!' : `${result.error}`;
}
</script>
