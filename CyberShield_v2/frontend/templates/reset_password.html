<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый пароль - CyberShield для ИП</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🛡️ CyberShield для ИП</h1>
            <h2>Установка нового пароля</h2>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            {% if success %}
            <div class="alert alert-success">{{ success }}</div>
            <div class="auth-links">
                <p><a href="/login">Войти с новым паролем</a></p>
            </div>
            {% else %}
            <form method="POST" action="/reset-password?token={{ token }}">
                <div class="form-group">
                    <label for="password">Новый пароль</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Минимум 6 символов" class="form-input">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Подтверждение пароля</label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                           placeholder="Повторите пароль" class="form-input">
                </div>

                <button type="submit" class="btn btn-primary btn-full">Изменить пароль</button>
            </form>

            <div class="auth-links">
                <p><a href="/login">Вернуться ко входу</a></p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
